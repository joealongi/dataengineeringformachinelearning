events {}

http {
    server {
        listen ${PORT:-8080};          # Railway sets PORT; fallback to 8080
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Essential for Angular SPA: serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Optional: better caching for static assets
        location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|css|js|woff|woff2|ttf|eot)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }

        # Security headers (optional but good)
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
    }
}